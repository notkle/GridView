<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gridview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;600;700&family=Caveat:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app" id="app">

    <header class="topbar">
      <div class="logo">gridview<span class="logo-dot">.</span></div>
      <div class="topbar-center" id="ad-alert" style="display:none">
        <div class="ad-alert-pill">
          <span class="ad-dot"></span>
          ad detected — swapping focus
        </div>
      </div>
      <div class="controls">
        <div class="zoom-toggle-wrap">
          <span class="toggle-label" id="lbl-grid">grid</span>
          <button class="zoom-toggle" id="zoomToggle" aria-pressed="false" onclick="toggleZoom()">
            <span class="zoom-thumb"></span>
          </button>
          <span class="toggle-label" id="lbl-zoom">zoom</span>
        </div>
      </div>
    </header>

    <main class="stage" id="stage">

      <!-- GRID MODE -->
      <div class="grid-view" id="gridView">
        <div class="cell" id="cell-0" data-index="0">
          <div class="cell-empty" onclick="openPicker(0)">
            <div class="plus-btn">+</div>
            <span class="plus-label">add panel</span>
          </div>
        </div>
        <div class="cell" id="cell-1" data-index="1">
          <div class="cell-empty" onclick="openPicker(1)">
            <div class="plus-btn">+</div>
            <span class="plus-label">add panel</span>
          </div>
        </div>
        <div class="cell" id="cell-2" data-index="2">
          <div class="cell-empty" onclick="openPicker(2)">
            <div class="plus-btn">+</div>
            <span class="plus-label">add panel</span>
          </div>
        </div>
        <div class="cell" id="cell-3" data-index="3">
          <div class="cell-empty" onclick="openPicker(3)">
            <div class="plus-btn">+</div>
            <span class="plus-label">add panel</span>
          </div>
        </div>
      </div>

      <!-- ZOOM MODE -->
      <div class="zoom-view" id="zoomView" style="display:none">
        <div class="zoom-main" id="zoomMain">
          <div class="zoom-empty">
            <span>select a panel to focus</span>
          </div>
        </div>
        <div class="zoom-dock" id="zoomDock">
          <div class="dock-slot" id="dock-0"></div>
          <div class="dock-slot" id="dock-1"></div>
          <div class="dock-slot" id="dock-2"></div>
        </div>
      </div>

    </main>
  </div>

  <!-- SERVICE PICKER MODAL -->
  <div class="modal-overlay" id="modalOverlay" onclick="closePicker()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span class="modal-title">add a panel</span>
        <button class="modal-close" onclick="closePicker()">✕</button>
      </div>
      <div class="modal-services">
        <button class="service-btn" data-service="twitch" onclick="selectService('twitch')">
          <svg class="service-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg>
          <span>Twitch</span>
          <span class="service-hint">live stream</span>
        </button>
        <button class="service-btn" data-service="notepad" onclick="selectService('notepad')">
          <svg class="service-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="8" y1="13" x2="16" y2="13"/>
            <line x1="8" y1="17" x2="16" y2="17"/>
            <line x1="8" y1="9"  x2="10" y2="9"/>
          </svg>
          <span>Notepad</span>
          <span class="service-hint">notes &amp; writing</span>
        </button>
      </div>
      <div class="modal-input-wrap" id="modalInputWrap" style="display:none">
        <label class="input-label" id="inputLabel">Channel name</label>
        <input class="modal-input" id="modalInput" type="text" placeholder="" />
        <button class="modal-confirm" onclick="confirmStream()">add →</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
